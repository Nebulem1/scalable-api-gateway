version: "3.9"

services:
   
  prometheus:
      image: prom/prometheus
      ports:
        - "9090:9090"
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
      networks:
        - appnet
      depends_on:
        - gateway
      

  grafana:
      image: grafana/grafana
      ports:
        - "3000:3000"
      networks:
        - appnet
      depends_on:
        - prometheus

  redis:
    image: redis:7
    networks:
      - appnet

  gateway:
    build: ./Gateway
    depends_on:
      - redis
      - product_service
      - user_service
    networks:
      - appnet

  product_service:
    build: ./Service/product
    networks:
      - appnet

  user_service:
    build: ./Service/user
    networks:
      - appnet
    
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - gateway
    networks:
      - appnet
networks:
  appnet: